version: "3.9"

services:

  backend:

    build:
      context: ./Backend

    container_name: crm_backend

    ports:
      - "5000:5000"

    env_file:
      - ./Backend/.env

    restart: always

  frontend:

    build:
      context: ./Frontend

    container_name: crm_frontend

    ports:
      - "5173:5173"

    env_file:
      - ./Frontend/.env

    depends_on:
      - backend

    restart: always